<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Futures Control Simulator</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f9fafb; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 24px; width: 100%; max-width: 600px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #111827; margin-top: 0; }
        .chart-area { height: 200px; border: 1px solid #eee; margin-bottom: 20px; position: relative; background: #fff; overflow: hidden; }
        .line { position: absolute; height: 2px; background: #2563eb; transition: top 0.1s; }
        .boundary { position: absolute; width: 100%; border-top: 1px dashed #999; left: 0; }
        .controls { display: grid; grid-template-cols: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        label { font-size: 12px; font-weight: bold; color: #374151; display: block; margin-bottom: 4px; }
        input { width: 100%; }
        button { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #9ca3af; }
        .stats { display: grid; grid-template-cols: 1fr 1fr; gap: 10px; background: #f3f4f6; padding: 12px; border-radius: 6px; text-align: center; }
        .stat-label { font-size: 10px; color: #6b7280; text-transform: uppercase; }
        .stat-val { font-family: monospace; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Risk Control Simulator</h2>
        <div class="chart-area" id="canvas">
            <div id="tp-line" class="boundary" style="top: 20%;"></div>
            <div id="sl-line" class="boundary" style="top: 80%;"></div>
            <div id="price-dot" style="position: absolute; width: 8px; height: 8px; background: black; border-radius: 50%; left: 0; top: 50%;"></div>
        </div>
        
        <div class="controls">
            <div>
                <label>Volatility</label>
                <input type="range" id="vol" min="1" max="10" value="5">
                <label>Latency (ms)</label>
                <input type="range" id="delay" min="0" max="2000" step="100" value="500">
            </div>
            <div style="text-align: right;">
                <p id="status-text" style="font-size: 14px; font-weight: bold; color: #2563eb;">MONITORING</p>
            </div>
        </div>

        <button id="start-btn">START SIMULATION</button>
        <button id="reset-btn" style="background:#6b7280; margin-top:10px;">RESET</button>

        <div class="stats" style="margin-top: 20px;">
            <div><div class="stat-label">Actual P&L</div><div id="actual-val" class="stat-val">0.00%</div></div>
            <div><div class="stat-label">Slippage</div><div id="slip-val" class="stat-val" style="color:red;">0.00%</div></div>
        </div>
    </div>

    <script>
        let price = 0;
        let time = 0;
        let isRunning = false;
        let status = 'MONITORING';
        let timer;

        const canvas = document.getElementById('canvas');
        const dot = document.getElementById('price-dot');
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status-text');

        function update() {
            if (!isRunning) return;
            
            const vol = document.getElementById('vol').value / 10;
            const delay = document.getElementById('delay').value;
            
            price += (Math.random() - 0.5) * vol;
            time += 2;
            
            // UI 更新
            dot.style.left = time + 'px';
            dot.style.top = (100 - (price + 50)) + '%';

            if (status === 'MONITORING') {
                if (price >= 30 || price <= -30) {
                    status = 'TRIGGERED';
                    statusText.innerText = 'TRIGGERED';
                    const target = price >= 30 ? 30 : -30;
                    
                    setTimeout(() => {
                        status = 'LIQUIDATED';
                        statusText.innerText = 'LIQUIDATED';
                        isRunning = false;
                        const slip = Math.abs(price - target).toFixed(2);
                        document.getElementById('actual-val').innerText = price.toFixed(2) + '%';
                        document.getElementById('slip-val').innerText = slip + '%';
                    }, delay);
                }
            }

            if (time > canvas.offsetWidth) isRunning = false;
            if (isRunning) requestAnimationFrame(update);
        }

        startBtn.onclick = () => {
            price = 0; time = 0; status = 'MONITORING'; isRunning = true;
            statusText.innerText = 'MONITORING';
            document.getElementById('actual-val').innerText = '0.00%';
            document.getElementById('slip-val').innerText = '0.00%';
            update();
        };

        document.getElementById('reset-btn').onclick = () => location.reload();
    </script>
</body>
</html>
